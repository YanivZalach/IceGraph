version: '3'

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    entrypoint: 
      - "bash"
      - "-c"
      - "/opt/spark/sbin/start-master.sh && tail -f /dev/null"
    volumes:
      - ./data:/opt/spark/work-dir/spark-warehouse/data:rw

  spark-connect:
    image: apache/spark:3.5.1
    container_name: spark-connect
    hostname: spark-connect
    user: root
    ports:
      - "4040:4040"
      - "15002:15002"
    depends_on:
      - spark-master
    volumes:
      - ./data:/warehouse:rw
    entrypoint: ["/opt/spark/bin/spark-submit"]
    command:
      - "--packages"
      - "org.apache.spark:spark-connect_2.12:3.5.1,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.2,org.apache.spark:spark-avro_2.12:3.5.1"
      - "--conf"
      - "spark.connect.grpc.binding.address=0.0.0.0"
      - "--conf"
      - "spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
      - "--conf"
      - "spark.sql.catalog.spark_catalog=org.apache.iceberg.spark.SparkSessionCatalog"
      - "--conf"
      - "spark.sql.catalog.spark_catalog.type=hadoop"
      - "--conf"
      - "spark.sql.catalog.spark_catalog.warehouse=/warehouse"
      - "--class"
      - "org.apache.spark.sql.connect.service.SparkConnectServer"
      - "spark-internal"

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    entrypoint:
      - "bash" 
      - "-c"
      - "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"
    volumes:
      - ./data:/opt/spark/work-dir/spark-warehouse/data:rw
